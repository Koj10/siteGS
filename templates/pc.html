{% extends "base.html" %}
{% block title %}Компьютеры{% endblock %}
{% block content %}
<div id="dropdownContainer"></div>
<section>
    <header>
        <h2>Настройка <span class="accent-text">компьютеров</span></h2>
    </header>
	<div id="pcContainer" class="cardsContainer">
	</div>
</section>
<div id="busyPcContainer" class="busy-pcs-container"></div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/showPC.js') }}" defer></script>
<script>
	document.addEventListener('DOMContentLoaded', function() {
    // Родительский контейнер, в котором появляются элементы с dropdown
    const container = document.getElementById('pcContainer'); // Или 'dropdownContainer', если меню там
    let openedDropdownId = null;
    
    function positionDropdownAtRight(menu) {
        menu.style.position = 'fixed';
        menu.style.visibility = 'hidden';
        menu.classList.add('pc-dropdown-fixed');
        menu.classList.add('show');

        if (window.matchMedia('(max-width: 1000px)').matches) {
            menu.style.right = '';
            menu.style.left = '';
            menu.style.top = '';
            menu.style.bottom = '';
            menu.style.visibility = '';
            return;
        }

        menu.style.right = '28px';
        menu.style.left = 'auto';
        menu.style.top = '130px';
        menu.style.bottom = 'auto';
        menu.style.visibility = '';
    }

    function closeAllDropdowns() {
        document.querySelectorAll('.dropdown-content').forEach(menu => {
            menu.classList.remove('show');
        });
        openedDropdownId = null;
    }

    // Обработчик кликов для всего контейнера
    container.addEventListener('click', function(event) {
        // Проверяем, был ли клик по элементу с атрибутом dropdown
    	const toggle = event.target.closest('[dropdown]');
    	if (toggle) {
    		const dropdownId = toggle.getAttribute('dropdown');
    		const dropdownMenu = document.getElementById(dropdownId);
    		if (dropdownMenu) {
                const shouldCloseCurrent = openedDropdownId === dropdownId && dropdownMenu.classList.contains('show');
                closeAllDropdowns();
                if (!shouldCloseCurrent) {
                    positionDropdownAtRight(dropdownMenu);
                    openedDropdownId = dropdownId;
                }
                event.stopPropagation(); // Чтобы не сработал window.click ниже
            }
        }
    });

    // Закрываем меню при клике вне его
    window.addEventListener('click', function(event) {
        if (event.target.closest('.dropdown-content') || event.target.closest('[dropdown]')) {
            return;
        }
        closeAllDropdowns();
    });

});
</script>
<script src="{{ url_for('static', filename='js/checkAdmin.js') }}?v=1.0.1" defer></script>
{% endblock %}

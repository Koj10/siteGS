{% extends "base.html" %}
{% block title %}Инвентарь{% endblock %}
{% block content %}
<section class="menu" id="about_activate">
	<h5 class="center">Карточку можно активировать только в клубе<br>С нетерпением ждём вас!</h5>
</section>
<button id="exit" onclick="logout()"><h5 class="iconoir-transition-right"></h5></button>

<section class="shop-section">
	<h2 class="section-title">МОИ КАРТОЧКИ</h2>
	<div id="cardsContainer" class="cardsContainer"></div>
</section>
<section class="shop-section shop-section--blocked">
	<h2 class="section-title section-title--muted">НЕДОСТУПНЫЕ</h2>
	<div id="blockedContainer" class="cardsContainer"></div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/inventory.js') }}?v=2.0"></script>
<script src="{{ url_for('static', filename='js/activate.js') }}" defer></script>
{% endblock %}

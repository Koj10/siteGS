<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Roboto+Condensed:400,700" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='roulette/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/states.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
  <title>Рулетка</title>
  <link rel="icon" href="{{ url_for('static', filename='lib/ghonse.svg') }}" type="image/x-icon">
</head>

<body class="full">
  <div id="custom-notification" class="notification"></div>
  <div id="app" v-cloak>
    <!-- status buttons-->
    <div class="game-status">

      <transition name="slide-fade">
        <div class="status-container" v-if="isToggle">
          <div class="times">CHANCE <span>[[time_remaining]]</span></div>
          <div class="buttons">
            <button class="btn btn-primary" :class="{'active':current_year===2017}"
              @click="setCurrentYear(2017)">2017</button>
            <button class="btn btn-primary" :class="{'active':current_year===2018}"
              @click="setCurrentYear(2018)">2018</button>
            <button class="btn btn-secondary" @click="restart">Restart</button>
          </div>
        </div>
      </transition>
    </div>

    <div class="lucky-wheel">
      <div class="pointer-container">
        <div
          :class="pointerClass"
          ref="pointer"
          id="pointer"
          :style="{'transform':rotate_deg,'transition': prize_transition}"
          @click="rotateHandler">
        </div>
      </div>
      <!-- lucky wheel -->
      <div :class="containerClass">
        <div v-for="(item,index) in prizes" :key="item.name" ref="item" :class="itemClass">
          <div :class="contentClass">
            <i class="material-icons">
              [[item.icon]]
            </i>
            <span>[[item.name]]
              <span :class="countClass">[[item.count]]</span>
            </span>
          </div>
        </div>
      </div>

      <!-- display results -->
      <transition name="slide-fade">
        <div class="roulette-modal" v-if="prizeModalVisible">
          <div class="roulette-modal__backdrop"></div>
          <div class="roulette-modal__dialog" role="dialog" aria-modal="true">
            <p class="roulette-modal__label">Ваш приз</p>
            <div class="roulette-modal__prize">
              <i class="material-icons">[[prize_icon]]</i>
              <span class="roulette-modal__prize-name">[[prize_name]]</span>
            </div>
            <button
              type="button"
              class="roulette-modal__btn"
              :disabled="claimLoading"
              @click="claimPrize">
              [[ claimLoading ? 'Получаем...' : 'Получить приз' ]]
            </button>
          </div>
        </div>
      </transition>
    </div>
  </div>
  <script>window.GS_API_BASE = {{ gs_api_base | tojson }};</script>
  <script src="{{ url_for('static', filename='js/api-config.js') }}?v=1.0.2"></script>
  <script src="{{ url_for('static', filename='js/update-user.js') }}?v=1.0.2"></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.8/vue.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/axios/0.18.0/axios.js'></script>
  <script src="{{ url_for('static', filename='roulette/all.js') }}?v=2.0.0"></script>
  <script src="{{ url_for('static', filename='roulette/snowfall.js') }}"></script>
  <script src="{{ url_for('static', filename='js/notification.js') }}" defer></script>
</body>

</html>

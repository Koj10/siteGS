{% extends "admin_layout.html" %}
{% block title %}Выручка{% endblock %}
{% block admin_body %}
<h1 class="admin-page-title">Отчёт по выручке</h1>
<p class="admin-page-sub">Наличные и безнал учитываются при ручном пополнении в разделе «Клиенты». Онлайн — успешные платежи ЮKassa.</p>

<div class="revenue-grid" id="revenue-root">
	<div class="revenue-block">
		<h3>Сегодня</h3>
		<div id="rev-block-today"></div>
	</div>
	<div class="revenue-block">
		<h3>7 дней</h3>
		<div id="rev-block-week"></div>
	</div>
	<div class="revenue-block">
		<h3>30 дней</h3>
		<div id="rev-block-month"></div>
	</div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/revenue.js') }}" defer></script>
<script src="{{ url_for('static', filename='js/checkAdmin.js') }}?v=1.0.2" defer></script>
{% endblock %}

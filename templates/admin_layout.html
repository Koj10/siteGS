{% extends "base.html" %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}
{% block body_class %}admin-app{% endblock %}
{% block content %}
<div class="admin-shell">
	<aside class="admin-sidebar" aria-label="Админ-меню">
		<div class="admin-brand">
			<div class="admin-brand-mark">GS</div>
			<div class="admin-brand-text">
				<strong>GameSense</strong>
				<span>Пульт управления</span>
			</div>
		</div>
		<nav class="admin-nav">
			<a href="/admin" class="{% if admin_nav|default('overview') == 'overview' %}active{% endif %}">
				<i class="icon iconoir-view-grid"></i>
				Обзор
			</a>
			<a href="/admin/add_balance" class="{% if admin_nav|default('') == 'clients' %}active{% endif %}">
				<i class="icon iconoir-community"></i>
				Клиенты
			</a>
			<a href="/admin/pc" class="{% if admin_nav|default('') == 'pc' %}active{% endif %}">
				<i class="icon iconoir-pc-check"></i>
				Компьютеры
			</a>
			<a href="/admin/revenue" class="{% if admin_nav|default('') == 'revenue' %}active{% endif %}">
				<i class="icon iconoir-credit-cards"></i>
				Выручка
			</a>
		</nav>
		<div class="admin-sidebar-footer">
			<a href="/"><i class="icon iconoir-shop"></i> В клуб</a>
		</div>
	</aside>
	<div class="admin-main">
		{% block admin_body %}{% endblock %}
	</div>
</div>
{% endblock %}

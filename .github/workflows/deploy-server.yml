name: Деплой на сервер

on:
  workflow_dispatch:
    inputs:
      api_tag:
        description: 'Тег образа API (latest или 1.0.x)'
        required: false
        default: 'latest'
      site_tag:
        description: 'Тег образа Site (latest или 1.0.x)'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Проверка секретов
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SERVER_IP}" ]; then
            echo "::error::Секрет SERVER_IP не задан (Settings → Secrets → Actions)"
            exit 1
          fi
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::Секрет SSH_PRIVATE_KEY не задан"
            exit 1
          fi

      - name: Настройка SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Деплой на сервер
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          API_TAG: ${{ github.event.inputs.api_tag }}
          SITE_TAG: ${{ github.event.inputs.site_tag }}
        run: |
          USER="${SERVER_USER:-root}"
          DEPLOY_DIR="/opt/gamesense"

          ssh -o StrictHostKeyChecking=no "${USER}@${SERVER_IP}" \
            "API_TAG=${API_TAG} SITE_TAG=${SITE_TAG} DEPLOY_DIR=${DEPLOY_DIR} bash -s" << 'REMOTE'
          set -euo pipefail
          cd "${DEPLOY_DIR}"
          export API_TAG SITE_TAG
          docker compose pull
          docker compose up -d
          docker compose ps
          REMOTE
